name: CI/CD Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop
      - feature/*
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
        matrix:
            java-version: [21]
            node-version: [24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
            java-version: ${{ matrix.java-version }}
            distribution: 'temurin'
      - name: Tests
        run: ./mvnw -B test
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 21 ]
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Build
        run: ./mvnw -B clean compile
  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref== 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jenkins-maven-tp:latest
            ${{ secrets.DOCKER_USERNAME }}/jenkins-maven-tp:${{ github.sha }}



