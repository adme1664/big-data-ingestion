name: CI/CD Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop
      - feature/*
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
        matrix:
            java-version: [21]
            node-version: [24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
            java-version: ${{ matrix.java-version }}
            distribution: 'temurin'
      - name: Tests
        run: ./mvnw -B test
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'amazon-corretto'

      - name: Build
        run: ./mvnw -B clean compile